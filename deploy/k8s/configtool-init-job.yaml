# ScalarRE Config Tool — sample init Job.
#
# Creates the RE schema in-cluster via DistributedTransactionAdmin.
# The DBs are reached through service DNS (mysql/postgres/dynamodb.scalar-re),
# so no minikube tunnel is needed (a connectivity proof closer to production).
#
# Prerequisites: ./gradlew bootJar && (eval $(minikube docker-env)) && docker build -t scalar-re-config-tool:dev .
# Run: kubectl apply -f deploy/k8s/configtool-init-job.yaml
#      kubectl -n scalar-re wait --for=condition=complete job/configtool-init --timeout=240s
#      kubectl -n scalar-re logs job/configtool-init
# To recreate, add --recreate-schema to args (destructive).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: configtool-config
  namespace: scalar-re
data:
  scalar-re-config.yml: |
    schema-version: '1.0'
    global:
        auth:
            api-key: ${SCALAR_RE_API_KEY:change-me}
        cluster:
            cleanup-retention-ms: 86400000
            cluster-id: default
            heartbeat-expiry-ms: 60000
            heartbeat-interval-ms: 30000
        completed-ttl-seconds: 0
        internal-queue:
            queue-capacity: 10000
            worker-threads: 10
        license:
            expires-at: '2027-12-31T00:00:00Z'
            max-nodes: 3
        polling:
            dedup-enabled: true
            dedup-peer-timeout-ms: 3000
        re-tables:
            re_completed:
                namespace: scalarre
            re_node_heartbeat:
                namespace: scalarre
            re_queue:
                namespace: scalarre
            re_subscription:
                namespace: scalarre
        recovery:
            prepared-age-threshold-ms: 15000
        replay:
            enabled: true
            queue-capacity: 100000
            worker-threads: 2
        retry:
            initial-delay-ms: 100
            max-attempts: 3
            max-delay-ms: 5000
            multiplier: 2
        server:
            tomcat-max-threads: 200
        subscription:
            cache-refresh-interval-ms: 60000
    scalardb:
        default-storage: mysql
        isolation-level: READ_COMMITTED
        transaction-manager: consensus-commit
    storages:
        dynamo:
            access-key-id: ${SCALAR_RE_DB_DYNAMO_ACCESS_KEY:fakeAccessKey}
            options:
                endpoint-override: ${SCALAR_RE_DB_DYNAMO_ENDPOINT:http://dynamodb:8000}
                namespace-prefix: scalardb_
            region: ${SCALAR_RE_DB_DYNAMO_REGION:fakeRegion}
            secret-access-key: ${SCALAR_RE_DB_DYNAMO_SECRET_KEY:fakeSecretKey}
            type: dynamo
        mysql:
            driver: mysql
            host: ${SCALAR_RE_DB_MYSQL_HOST:localhost}
            options:
                connection-params: sslMode=REQUIRED
                connection-pool-max-total: 200
                metadata-cache-expiration-secs: 60
            password: ${SCALAR_RE_DB_MYSQL_PASSWORD:scalaradmin}
            port: ${SCALAR_RE_DB_MYSQL_PORT:3306}
            type: jdbc
            username: ${SCALAR_RE_DB_MYSQL_USERNAME:scalaradmin}
        postgres:
            database: ${SCALAR_RE_DB_POSTGRES_DATABASE:db_postgres}
            driver: postgresql
            host: ${SCALAR_RE_DB_POSTGRES_HOST:localhost}
            options:
                connection-pool-max-total: 200
                metadata-cache-expiration-secs: 60
            password: ${SCALAR_RE_DB_POSTGRES_PASSWORD:scalaradmin}
            port: ${SCALAR_RE_DB_POSTGRES_PORT:5432}
            type: jdbc
            username: ${SCALAR_RE_DB_POSTGRES_USERNAME:scalaradmin}
    namespaces:
        ns_dynamo:
            completed-enabled: true
            destination:
                queue-capacity: 100000
                throughput-tps: 2000
                worker-threads: 30
            event-types:
                DynamoAtomic:
                    delivery-type: atomic
                    enabled: true
                DynamoPull:
                    delivery-type: pull
                    destination: ns_mysql
                    enabled: true
            hmac:
                key: ${SCALAR_RE_HMAC_KEY_NS_DYNAMO:demo-hmac-key-ns_dynamo}
                key-previous: ${SCALAR_RE_HMAC_KEY_NS_DYNAMO_PREV:}
                key-previous-expires-at: 0
            polling:
                outbox-batch-size: 100
                outbox-poll-delay-ms: 5000
                outbox-poll-interval-ms: 5000
            storage: dynamo
        ns_mysql:
            completed-enabled: true
            destination:
                queue-capacity: 100000
                throughput-tps: 2000
                worker-threads: 30
            event-types:
                MysqlAtomic:
                    delivery-type: atomic
                    enabled: true
                MysqlPartial:
                    delivery-type: partial
                    enabled: true
                MysqlPull:
                    delivery-type: pull
                    destination: ns_postgres
                    enabled: true
                MysqlQpull:
                    delivery-type: qpull
                    enabled: true
                    partition-count: 2
                MysqlRelay:
                    delivery-type: relay
                    enabled: true
                MysqlSpull:
                    delivery-type: spull
                    enabled: true
                    partition-count: 2
            hmac:
                key: ${SCALAR_RE_HMAC_KEY_NS_MYSQL:demo-hmac-key-ns_mysql}
                key-previous: ${SCALAR_RE_HMAC_KEY_NS_MYSQL_PREV:}
                key-previous-expires-at: 0
            polling:
                outbox-batch-size: 100
                outbox-poll-delay-ms: 5000
                outbox-poll-interval-ms: 5000
            storage: mysql
        ns_postgres:
            completed-enabled: true
            destination:
                queue-capacity: 100000
                throughput-tps: 2000
                worker-threads: 30
            event-types:
                PostgresAtomic:
                    delivery-type: atomic
                    enabled: true
                PostgresPull:
                    delivery-type: pull
                    destination: ns_mysql
                    enabled: true
            hmac:
                key: ${SCALAR_RE_HMAC_KEY_NS_POSTGRES:demo-hmac-key-ns_postgres}
                key-previous: ${SCALAR_RE_HMAC_KEY_NS_POSTGRES_PREV:}
                key-previous-expires-at: 0
            polling:
                outbox-batch-size: 100
                outbox-poll-delay-ms: 5000
                outbox-poll-interval-ms: 5000
            storage: postgres
        scalarre:
            completed-enabled: true
            destination:
                queue-capacity: 100000
                throughput-tps: 2000
                worker-threads: 30
            event-types: {}
            hmac:
                key: ${SCALAR_RE_HMAC_KEY_SCALARRE:demo-hmac-key-scalarre}
                key-previous: ${SCALAR_RE_HMAC_KEY_SCALARRE_PREV:}
                key-previous-expires-at: 0
            polling:
                outbox-batch-size: 100
                outbox-poll-delay-ms: 5000
                outbox-poll-interval-ms: 5000
            storage: mysql
---
apiVersion: batch/v1
kind: Job
metadata:
  name: configtool-init
  namespace: scalar-re
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: configtool-init
    spec:
      restartPolicy: Never
      containers:
      - name: configtool-init
        image: scalar-re-config-tool:dev
        imagePullPolicy: IfNotPresent
        args: ["--mode=init", "--config=/conf/scalar-re-config.yml"]
        env:
        # Resolve the ${SCALAR_RE_DB_*_HOST} placeholders to in-cluster service names
        - name: SCALAR_RE_DB_MYSQL_HOST
          value: "mysql"
        - name: SCALAR_RE_DB_POSTGRES_HOST
          value: "postgres"
        # The dynamo endpoint default http://dynamodb:8000 already matches the in-cluster service DNS, so no override is needed
        volumeMounts:
        - name: config
          mountPath: /conf
      volumes:
      - name: config
        configMap:
          name: configtool-config
