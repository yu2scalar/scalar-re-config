# PostgreSQL 15 for in-cluster verification.
# Data is on emptyDir — wiped on Pod restart.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: scalar-re
data:
  init.sql: |
    CREATE USER scalaradmin WITH PASSWORD 'scalaradmin';
    ALTER USER scalaradmin CREATEDB;
    CREATE DATABASE db_postgres OWNER scalaradmin;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: scalar-re
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        args: ["-c", "max_connections=1000"]
        ports:
        - name: postgres
          containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          value: "rootpassword"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: init
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
      volumes:
      - name: data
        emptyDir: {}
      - name: init
        configMap:
          name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: scalar-re
  labels:
    app: postgres
spec:
  type: LoadBalancer
  selector:
    app: postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
