worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent upstream=$upstream_addr';
    access_log /dev/stdout main;

    upstream scalarre {
        server re-1:8080 max_fails=3 fail_timeout=30s;
        server re-2:8080 max_fails=3 fail_timeout=30s;
        server re-3:8080 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://scalarre;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_502 http_503;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            add_header X-Upstream $upstream_addr;
        }
    }
}
