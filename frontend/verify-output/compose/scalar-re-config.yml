schema-version: "1.0"
global:
  management-namespace: scalarre
  management-storage: ""
  offload-completed-table: true
  subscription:
    cache-refresh-interval-ms: 60000
  auth:
    api-key: ${SCALAR_RE_API_KEY:change-me}
  retry:
    max-attempts: 3
    initial-delay-ms: 100
    max-delay-ms: 5000
    multiplier: 2
  internal-queue:
    worker-threads: 10
    queue-capacity: 10000
  cluster:
    cluster-id: default
    heartbeat-interval-ms: 30000
    heartbeat-expiry-ms: 60000
    cleanup-retention-ms: 86400000
  license:
    max-nodes: 3
    expires-at: 2027-12-31
  server:
    tomcat-max-threads: 200
  replay:
    enabled: true
    worker-threads: 2
    queue-capacity: 100000
  re-tables:
    re_node_heartbeat:
      namespace: scalarre
    re_completed:
      namespace: scalarre
    re_queue:
      namespace: scalarre
    re_subscription:
      namespace: scalarre
scalardb:
  transaction-manager: consensus-commit
  isolation-level: READ_COMMITTED
  default-storage: postgres
storages:
  mysql:
    type: jdbc
    driver: mysql
    host: ${SCALAR_RE_DB_MYSQL_HOST:mysql}
    port: ${SCALAR_RE_DB_MYSQL_PORT:3306}
    username: ${SCALAR_RE_DB_MYSQL_USERNAME:scalaradmin}
    password: ${SCALAR_RE_DB_MYSQL_PASSWORD:scalaradmin}
  postgres:
    type: jdbc
    driver: postgresql
    host: ${SCALAR_RE_DB_POSTGRES_HOST:postgres}
    port: ${SCALAR_RE_DB_POSTGRES_PORT:5432}
    database: ${SCALAR_RE_DB_POSTGRES_DATABASE:db_postgres}
    username: ${SCALAR_RE_DB_POSTGRES_USERNAME:scalaradmin}
    password: ${SCALAR_RE_DB_POSTGRES_PASSWORD:scalaradmin}
  dynamo:
    type: dynamo
    region: ${SCALAR_RE_DB_DYNAMO_REGION:fakeRegion}
    access-key-id: ${SCALAR_RE_DB_DYNAMO_ACCESS_KEY:fakeAccessKey}
    secret-access-key: ${SCALAR_RE_DB_DYNAMO_SECRET_KEY:fakeSecretKey}
    options:
      namespace-prefix: scalardb_
      endpoint-override: ${SCALAR_RE_DB_DYNAMO_ENDPOINT:http://dynamodb:8000}
namespaces:
  scalarre:
    storage: postgres
    destination:
      worker-threads: 30
      queue-capacity: 100000
      throughput-tps: 2000
    hmac:
      key: ${SCALAR_RE_HMAC_KEY_SCALARRE:demo-hmac-key}
      key-previous: ""
      key-previous-expires-at: 0
    event-types: {}
  ns_mysql:
    storage: mysql
    destination:
      worker-threads: 30
      queue-capacity: 100000
      throughput-tps: 2000
    hmac:
      key: ${SCALAR_RE_HMAC_KEY_NS_MYSQL:demo-hmac-key}
      key-previous: ""
      key-previous-expires-at: 0
    event-types: {}
  ns_postgres:
    storage: postgres
    destination:
      worker-threads: 30
      queue-capacity: 100000
      throughput-tps: 2000
    hmac:
      key: ${SCALAR_RE_HMAC_KEY_NS_POSTGRES:demo-hmac-key}
      key-previous: ""
      key-previous-expires-at: 0
    event-types: {}
  ns_dynamo:
    storage: dynamo
    destination:
      worker-threads: 30
      queue-capacity: 100000
      throughput-tps: 2000
    hmac:
      key: ${SCALAR_RE_HMAC_KEY_NS_DYNAMO:demo-hmac-key}
      key-previous: ""
      key-previous-expires-at: 0
    event-types: {}
